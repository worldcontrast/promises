# ── Trusted corroboration sources for triangulation ──────────────────────────
# A social-media URL is only accepted if at least one of these domains
# also appears in the same search-result snippets and names the same handle.
_CORROBORATION_SOURCES: frozenset[str] = frozenset({
    # Electoral courts
    "tse.jus.br", "cne.gob.ve", "inec.gob.ec", "fec.gov",
    "electoralcommission.org.uk", "conseil-constitutionnel.fr",
    # High-credibility press (for cross-reference, NOT as source URLs)
    "bbc.com", "reuters.com", "apnews.com", "nytimes.com",
    "theguardian.com", "lemonde.fr", "elcorreo.com",
    "folha.uol.com.br", "estadao.com.br", "valor.com.br",
    "g1.globo.com",
