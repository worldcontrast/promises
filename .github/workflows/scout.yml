#!/usr/bin/env python3
"""
World Contrast — Discovery Scout v2.0
File: agents/scout.py

CHANGES FROM v1
───────────────
1. Rate-limiting  — asyncio.Semaphore on all Anthropic API calls + exponential
   back-off on HTTP 429.  Prevents cloud-function bans.

2. Source Triangulation — social-media handles are only accepted when they are
   explicitly cross-referenced by TWO independent signals in the search results
   (e.g., the official campaign site AND a credible news outlet both name the
   same handle).  Guessed handles are rejected.

3. Scheduled-election scaffolding — can emit `status: "scheduled"` records for
   elections where candidates are not yet declared, instead of hard-exiting.

4. JSON parsing consolidated into a single, cleaner `extract_json()` function.

5. `validate_url()` moved to a helper module-level constant + function; no more
   duplicate inline definition.

6. `_discover_candidates()` returns a typed sentinel `SCHEDULED_PLACEHOLDER`
   when the LLM confirms the election exists but no candidates are declared yet.

Usage
─────
  export ANTHROPIC_API_KEY="sk-ant-..."
  python agents/scout.py --country BR --election "Presidential 2026"
  python agents/scout.py --country US --election "Senate Georgia 2028" --scheduled
"""

from __future__ import annotations

import argparse
import asyncio
import json
import logging
import os
import pathlib
import re
import sys
import unicodedata
from datetime import datetime, timezone
from typing import Any, Literal

import httpx

# ── Optional Tavily ───────────────────────────────────────────────────────────
try:
    from tavily import TavilyClient   # type: ignore
    HAS_TAVILY = True
except ImportError:
    HAS_TAVILY = False

logging.basicConfig(
    level=logging.INFO,
    format="%(asctime)s  %(levelname)-7s  %(message)s",
    datefmt="%H:%M:%S",
)
log = logging.getLogger("scout")

# ── Constants ─────────────────────────────────────────────────────────────────
ANTHROPIC_API_URL = "https://api.anthropic.com/v1/messages"
ANTHROPIC_MODEL   = "claude-sonnet-4-20250514"
MAX_TOKENS        = 2048          # reduced from 4096; outputs are small JSON

# Rate-limit: max concurrent Anthropic calls across the whole process
# Anthropic Sonnet tier 1 allows ~50 RPM; we cap at 4 concurrent to stay safe.
_ANTHROPIC_SEM: asyncio.Semaphore | None = None   # initialised in main()

# Retry config for HTTP 429 / 529
MAX_RETRIES   = 4
RETRY_BACKOFF = [1, 2, 4, 8]    # seconds

OUTPUT_DIR = pathlib.Path("data/countries")

# Sentinel returned when election exists but no candidates declared yet
SCHEDULED_PLACEHOLDER = "__SCHEDULED__"

# ── Domain reject-list for URL sanitisation ───────────────────────────────────
_REJECT_DOMAINS: frozenset[str] = frozenset({
    "wikipedia.org", "wikimedia.org",
    "g1.globo.com", "folha.uol.com.br", "uol.com.br",
    "bbc.com", "bbc.co.uk", "cnn.com",
