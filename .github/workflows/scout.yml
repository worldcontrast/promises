name: World Contrast — Scout Discovery Agent

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Sigla do País (Ex: BR, FR, US)'
        required: true
        default: 'BR'
      election:
        description: 'Nome da Eleição (Ex: Presidential 2026)'
        required: true
        default: 'Presidential 2026'

permissions:
  contents: write

jobs:
  run-scout:
    name: OSINT Scout Runner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx anthropic tavily-python duckduckgo-search

      - name: Run Scout Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python agents/scout.py \
            --country "${{ github.event.inputs.country }}" \
            --election "${{ github.event.inputs.election }}" \
            --search tavily

      - name: Commit and Push JSON
        run: |
          git config --global user.name "World Contrast Scout"
          git config --global user.email "scout@worldcontrast.org"
          git add data/countries/
          
          if git diff-index --quiet HEAD --; then
            echo "Nenhuma mudanca encontrada."
          else
            git commit -m "Scout: Base atualizada para ${{ github.event.inputs.country }} - ${{ github.event.inputs.election }}"
            git pull --rebase origin main
            git push
          fi
