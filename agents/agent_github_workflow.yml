# World Contrast — Agent Scheduler
# File: .github/workflows/agent-run.yml
#
# Runs the full collection pipeline every 5 days.
# Also triggered manually via workflow_dispatch.
#
# Every run is:
# - Publicly visible in the GitHub Actions tab
# - Logged with full statistics
# - Verifiable by anyone in the world
#
# This makes the scheduling itself part of the audit trail.
# You can see EXACTLY when the agent ran and what it found.

name: Agent — Collection Pipeline

on:
  # Run every 5 days at 06:00 UTC
  schedule:
    - cron: '0 6 */5 * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      country:
        description: 'Country code to process (leave empty for all)'
        required: false
        default: ''
      election_id:
        description: 'Specific election ID (leave empty for all active)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (extract but do not save)'
        required: false
        default: 'false'
        type: boolean

jobs:
  collect:
    name: Collect Political Promises
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max

    # Permissions: read code, write to issues (for error reporting)
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r agents/requirements.txt
          playwright install chromium --with-deps

      - name: Verify agent integrity
        run: |
          echo "Agent version: $(python -c 'from config.settings import Settings; print(Settings.__dataclass_fields__["agent_version"].default)')"
          echo "Extraction prompt hash:"
          sha256sum agents/extraction/prompts/extraction_prompt.txt

      - name: Run collection pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          AGENT_VERSION: '1.0.0'
          LOG_LEVEL: 'INFO'
        run: |
          python agents/scheduler.py \
            ${{ github.event.inputs.country && format('--country {0}', github.event.inputs.country) || '' }} \
            ${{ github.event.inputs.election_id && format('--election {0}', github.event.inputs.election_id) || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/*.log
          retention-days: 90  # Keep logs for 90 days

      - name: Report failure as public issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Agent run failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The scheduled collection pipeline failed.\n\nRun: ${context.runId}\nSee logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis issue is created automatically for transparency.`,
              labels: ['agent-failure', 'automated'],
            });
